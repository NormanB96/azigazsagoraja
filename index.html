<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Igazság Órája</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background-color: #000;
    color: #fff;
    text-align: center;
    padding: 20px;
    margin: 0;
  }

  h1 {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 6vw; /* méret a képernyő szélességéhez igazítva */
    margin: 0;
    white-space: nowrap; /* egy sorban maradjon */
  }

  #timer {
    font-weight: bold;
    font-size: 10vw; /* nagy, reszponzív */
    margin: 20px 0;
    white-space: nowrap; /* egy sorban */
  }

  .text {
    font-size: 3vw; /* reszponzív, kisebb a drámai szöveg */
    color: #ccc;
    max-width: 95vw; /* mobilon se törjön ki */
    margin-bottom: 20px;
  }

  #btc {
    font-size: 2.5vw;
    margin-top: 10px;
    color: #fff;
    white-space: nowrap;
    overflow-x: auto; /* hosszú cím esetén görgethető */
    -webkit-overflow-scrolling: touch; /* sima görgetés iOS-en */
  }

  #btc strong:first-child {
    color: #f7931A; /* BTC felirat narancssárga */
  }

  #qr {
    margin-top: 10px;
    width: 40vw;
    max-width: 200px;
    height: auto;
    background-color: #fff;
    padding: 5px;
  }
</style>
</head>
<body>

<h1>AZ IGAZSÁG ÓRÁJA</h1>

<div id="timer">--:--:--</div>

<div class="text" id="message">
  Ne maradj ki! Támogasd, hogy az óra tovább ketyeghessen, és az elért fordulóponton se álljon meg!
</div>

<div id="btc">
  <strong>BTC cím:</strong> <strong>32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx</strong>
</div>

<img id="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=bitcoin:32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx" alt="Scan to pay BTC">

<script>
const timer = document.getElementById("timer");
const targetDate = new Date("2026-04-12T22:00:00+02:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  let diff = targetDate - now;
  const totalSeconds = Math.floor(Math.abs(diff) / 1000);

  const days = Math.floor(totalSeconds / (24*60*60));
  const hours = Math.floor((totalSeconds % (24*60*60)) / (60*60));
  const minutes = Math.floor((totalSeconds % (60*60)) / 60);
  const seconds = totalSeconds % 60;

  timer.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
