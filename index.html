<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Igazság Órája</title>
<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    text-align: center;
    padding: 20px;
  }
  #timer {
    font-size: 3em;
    margin: 20px 0;
    color: #222;
  }
  .text {
    font-size: 1.5em;
    color: #555;
    max-width: 600px;
    margin-bottom: 20px;
  }
  #btc {
    font-size: 1.3em;
    margin-top: 10px;
    word-break: break-all;
  }
  #qr {
    margin-top: 10px;
    width: 200px;
    height: 200px;
  }
</style>
</head>
<body>

<h1>Az Igazság Órája</h1>
<div id="timer">--:--:--</div>

<div class="text" id="message">
  Ez az óra figyel. Minden perc, ami eltelik, emlékeztet az ígéretekre.<br>
  Támogasd, hogy az óra tovább ketyegjen, és az elért fordulóponton se álljon meg.<br>
  Ne maradj ki.
</div>

<div id="btc">
  BTC cím: 32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx
</div>
<img id="qr" src="https://chart.googleapis.com/chart?cht=qr&chl=bitcoin:32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx&chs=200x200&choe=UTF-8&chld=L|2" alt="Scan to pay BTC">

<script>
const timer = document.getElementById("timer");
const targetDate = new Date("2026-04-12T22:00:00+02:00").getTime();

function updateTimer() {
  const now = new Date().getTime();
  let diff = targetDate - now;
  const totalSeconds = Math.floor(Math.abs(diff) / 1000);

  const days = Math.floor(totalSeconds / (24*60*60));
  const hours = Math.floor((totalSeconds % (24*60*60)) / (60*60));
  const minutes = Math.floor((totalSeconds % (60*60)) / 60);
  const seconds = totalSeconds % 60;

  timer.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
