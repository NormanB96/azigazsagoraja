<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Az Igazság Órája</title>

<style>
  body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: #000;
    color: #fff;
    text-align: center;
  }

  h1 {
    text-transform: uppercase;
    font-weight: bold;
    font-size: 8vw;
    margin: 0;
    white-space: nowrap;
  }

  .subtitle {
    font-size: 3vw;
    color: #ccc;
    margin-top: 6px;
    margin-bottom: 10px;
    white-space: nowrap;
  }

  #timer {
    font-size: 10vw;
    font-weight: bold;
    margin: 20px 0;
    padding: 15px 25px;
    border: 3px solid #ccc;
    border-radius: 15px;
    white-space: nowrap;
  }

  .text {
    font-size: 3vw;
    color: #ccc;
    max-width: 95vw;
    margin-bottom: 20px;
  }

  #btc {
    margin-top: 20px;
    max-width: 95vw;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #btc-label {
    color: #f7931A;
    font-size: 3vw;
    font-weight: bold;
    margin-bottom: 4px;
  }

  #btc-address {
    font-size: 2.8vw;
    white-space: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin-bottom: 10px;
  }

  #qr {
    width: 40vw;
    max-width: 200px;
    background: #fff;
    padding: 5px;
  }
</style>
</head>

<body>

<h1>AZ IGAZSÁG ÓRÁJA</h1>
<div class="subtitle">2026. április 12. 22:00</div>

<div id="timer">--</div>

<div class="text">
  Ne maradj ki! Támogasd, hogy az óra tovább ketyeghessen, és az elért fordulóponton se álljon meg!
</div>

<div id="btc">
  <div id="btc-label">BTC cím:</div>
  <div id="btc-address">32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx</div>
  <img id="qr"
       src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=32zAVPdXpWVtsYGuukPrmeKqGShiiRkVsx"
       alt="BTC QR">
</div>

<script>
const timer = document.getElementById("timer");
const targetDate = new Date("2026-04-12T22:00:00+02:00").getTime();

function updateTimer() {
  const now = Date.now();
  const diff = targetDate - now;
  const s = Math.floor(Math.abs(diff) / 1000);

  const d = Math.floor(s / 86400);
  const h = Math.floor((s % 86400) / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;

  timer.textContent = `${d}d ${h}h ${m}m ${sec}s`;
}

setInterval(updateTimer, 1000);
updateTimer();
</script>

</body>
</html>
