<style>

body{

<body>

<h1>AZ IGAZSÁG ÓRÁJA</h1>
<div class="subtitle">2026. április 12. 22:00</div>

<div id="timer"></div>

<div class="text">
Ne maradj ki! Támogasd, hogy az óra tovább ketyeghessen, és az elért fordulóponton se álljon meg!
Az óra a fordulóponton újraindul és számolja az új rendszer korát, az óra nem felejti el az ígéreteket sem!
</div>

<div id="btc">

<div id="btc-label">BTC cím:</div>
<div id="btc-address">
bc1q27eyh4c5vjkf2h7ucxywxq9kuup7ajwwwzf9rp
</div>

<img id="qr"
src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=bc1q27eyh4c5vjkf2h7ucxywxq9kuup7ajwwwzf9rp"
alt="BTC QR">

</div>

<script>

const targetDate = new Date("2026-04-12T22:00:00+02:00").getTime();

function updateTimer(){

const now = new Date().getTime();
let diff = targetDate - now;

let direction = -1;

if(diff < 0){
diff = Math.abs(diff);
direction = 1;
}

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("timer").innerHTML =
days + " nap " + hours + " óra " + minutes + " perc " + seconds + " mp";

}

setInterval(updateTimer,1000);
updateTimer();

</script>
