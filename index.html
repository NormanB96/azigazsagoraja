<body>
  <!-- Ha van korábbi tartalom, az maradhat itt -->
  
  <!-- IDE másold be a visszaszámláló részt -->
  <div id="timer">--:--:--</div>
  <div class="text">
    Ez az óra csak addig ketyeg, amíg van, aki életben tartja.
  </div>
  <script>
    const targetDate = new Date("2026-04-12T20:00:00").getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        document.getElementById("timer").innerHTML = "MEGÁLLT";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("timer").innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }, 1000);
  </script>
</body>
